<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Measured Space Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='6' x2='42' y2='43'%3E%3Cstop stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%2314b8a6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='3' y='3' width='42' height='42' rx='11' fill='url(%23g)'/%3E%3Cpath d='M15 31V17l9-5 9 5v14l-9 5-9-5Z' fill='none' stroke='white' stroke-width='3.2' stroke-linejoin='round'/%3E%3Cpath d='M16 18 24 23l8-5M24 23v12' fill='none' stroke='white' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='15' cy='31' r='2.4' fill='white'/%3E%3Ccircle cx='33' cy='31' r='2.4' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-concept="field">
    <main class="app-shell">
      <header class="dashboard-header" aria-labelledby="app-title">
        <div class="brand-block">
          <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="brand-gradient" x1="8" y1="6" x2="42" y2="43">
                <stop stop-color="#2563eb"></stop>
                <stop offset="1" stop-color="#14b8a6"></stop>
              </linearGradient>
            </defs>
            <rect x="3" y="3" width="42" height="42" rx="11" fill="url(#brand-gradient)"></rect>
            <path class="brand-plane" d="M15 31V17l9-5 9 5v14l-9 5-9-5Z"></path>
            <path class="brand-line" d="M16 18 24 23l8-5M24 23v12"></path>
            <circle cx="15" cy="31" r="2.4"></circle>
            <circle cx="33" cy="31" r="2.4"></circle>
          </svg>
          <div>
            <p class="eyebrow">Measured Space</p>
            <h1 id="app-title">Tour Dashboard</h1>
          </div>
        </div>
        <div class="user-block">
          <span class="user-label">Signed in</span>
          <div id="dashboard-user-label" class="dashboard-user-label" aria-live="polite">Checking sign-in...</div>
        </div>
      </header>

      <section class="workspace-grid" aria-label="Assigned tour workspace">
        <section class="tour-panel" aria-labelledby="cloud-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Hosted revisions</p>
              <h2 id="cloud-title">Assigned tours</h2>
            </div>
            <button id="refresh-cloud-tours" class="secondary-button" type="button">Refresh</button>
          </div>
          <div id="cloud-tour-status" class="cloud-status" aria-live="polite">Loading assigned tours...</div>
          <div id="cloud-tour-list" class="tour-list" aria-live="polite"></div>
        </section>

        <section class="map-panel" aria-labelledby="map-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Project map</p>
              <h2 id="map-title">Assigned properties</h2>
            </div>
            <span id="map-status" class="panel-status" aria-live="polite">Preparing map...</span>
          </div>
          <div id="tour-map" class="tour-map" aria-label="Map of assigned tour addresses"></div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
