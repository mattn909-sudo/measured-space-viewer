<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Measured Space Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="upload-panel" aria-labelledby="app-title">
        <div class="brand-row">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1 id="app-title">Measured Space Viewer</h1>
            <p>Open a zipped virtual tour directly in your browser.</p>
          </div>
        </div>

        <form id="upload-form" class="upload-form">
          <div id="drop-zone" class="drop-zone">
            <input id="tour-file" name="tour" type="file" accept=".zip,application/zip" aria-label="Choose a tour zip">
            <span class="drop-icon" aria-hidden="true">ZIP</span>
            <span class="drop-title">Choose a tour export</span>
            <span id="file-name" class="drop-detail">or drag the zip file here</span>
          </div>

          <div class="form-actions">
            <button id="process-button" type="submit" disabled>Open tour</button>
          </div>
        </form>

        <div class="progress-wrap" aria-live="polite">
          <div class="progress-bar" aria-hidden="true">
            <span id="progress-fill"></span>
          </div>
          <p id="status-text">Waiting for a zip file.</p>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
